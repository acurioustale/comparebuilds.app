<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Compare Builds — WoW talent build comparison</title>
    <meta
      name="description"
      content="Import, build, and compare World of Warcraft talent loadouts side by side. Diff two builds, heatmap up to five, and share them with a short link."
    />
    <meta name="theme-color" content="#0d0d14" />

    <!-- Apply an explicit theme override before first paint so a stored choice
         never flashes. "auto" (no stored override) needs nothing here: the CSS
         `color-scheme: light dark` + light-dark() palette follows the OS on its
         own, with no JS. Mirrors src/index.css and the toggle on acurioustale.de.
         NOTE: this inline script is allowlisted in the CSP (public/.htaccess) by
         its sha256 hash (base64 of the sha256 of the exact, prettier-formatted
         script text). If you edit it, recompute the hash there or production
         will block it. -->
    <script>
      try {
        var t = localStorage.getItem("comparebuilds-theme");
        if (t === "light" || t === "dark")
          document.documentElement.dataset.theme = t;
      } catch (e) {
        /* localStorage unavailable — CSS follows the OS preference */
      }
    </script>

    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="author" href="/humans.txt" />

    <!-- Open Graph (link previews on Discord, Slack, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Compare Builds" />
    <meta
      property="og:title"
      content="Compare Builds — WoW talent build comparison"
    />
    <meta
      property="og:description"
      content="Import, build, and compare World of Warcraft talent loadouts side by side, then share them with a short link."
    />
    <meta property="og:url" content="https://comparebuilds.app/" />
    <meta
      property="og:image"
      content="https://comparebuilds.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Compare Builds — WoW talent build comparison tool"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Compare Builds — WoW talent build comparison"
    />
    <meta
      name="twitter:description"
      content="Import, build, and compare World of Warcraft talent loadouts side by side, then share them with a short link."
    />
    <meta
      name="twitter:image"
      content="https://comparebuilds.app/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Compare Builds — WoW talent build comparison tool"
    />

    <!-- Structured data for search engines. A data block (not executed JS), so
         it is exempt from the CSP script-src and needs no hash. The prerendered
         spec pages inherit it unchanged. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Compare Builds",
        "url": "https://comparebuilds.app/",
        "description": "Import, build, and compare World of Warcraft talent loadouts side by side, then share them with a short link.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any (modern web browser)",
        "browserRequirements": "Requires JavaScript.",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "Markus Spitzner",
          "url": "https://acurioustale.de/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
