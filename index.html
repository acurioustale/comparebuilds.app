<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Compare Builds — WoW talent build comparison</title>
    <meta
      name="description"
      content="Import, build, and compare World of Warcraft talent loadouts side by side. Diff two builds, heatmap up to five, and share them with a short link."
    />
    <meta name="theme-color" content="#0d0d14" />

    <!-- Resolve the theme before first paint to avoid a flash of the wrong one.
         #root is empty until React mounts, so there is no no-JS path to support:
         a stored override wins, otherwise follow the OS. Mirrors resolveTheme()
         in src/lib/theme.js; kept inline and synchronous on purpose.
         NOTE: this inline script is allowlisted in the CSP (public/.htaccess) by
         its sha256 hash. If you edit it, recompute the hash there or production
         will block it. -->
    <script>
      try {
        var stored = localStorage.getItem('comparebuilds-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.dataset.theme = theme;
      } catch (e) { /* localStorage/matchMedia unavailable — CSS defaults to dark */ }
    </script>

    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph (link previews on Discord, Slack, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Compare Builds" />
    <meta property="og:title" content="Compare Builds — WoW talent build comparison" />
    <meta
      property="og:description"
      content="Import, build, and compare World of Warcraft talent loadouts side by side, then share them with a short link."
    />
    <meta property="og:url" content="https://comparebuilds.app/" />
    <meta property="og:image" content="https://comparebuilds.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Compare Builds — WoW talent build comparison tool" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Compare Builds — WoW talent build comparison" />
    <meta
      name="twitter:description"
      content="Import, build, and compare World of Warcraft talent loadouts side by side, then share them with a short link."
    />
    <meta name="twitter:image" content="https://comparebuilds.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
