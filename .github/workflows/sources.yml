name: sources

# The data freshness check lives in its own workflow ON PURPOSE: the deploy
# workflow's `validate` gate is what blocks a release, and this check fetches
# Blizzard (Game Data API + wago.tools DB2) live — a momentary outage or an
# upstream shape change must never block deploy. It runs compareSources.js, which
# re-derives the data from Blizzard and diffs it against the committed src/data:
# HARD divergences (build-string wire layout, ranks, gates, prereqs) fail the job;
# SOFT differences (positions, names, descriptions, per-spec membership) are
# reported only.
#
# The weekly schedule catches the committed data drifting from a new game patch;
# the PR trigger catches a data change that breaks parity. A red run here is a
# signal to investigate, not a blocked release. It needs the BLIZZARD_CLIENT_ID/
# SECRET repo secrets and is skipped on fork PRs (which don't receive secrets).
on:
  pull_request:
    paths:
      - "scripts/ingestBlizzard.js"
      - "scripts/compareSources.js"
      - "scripts/lib/**"
      - "src/data/**"
      - "src/lib/wireLayout.snapshot.json"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm

      # compareSources.js pulls in the app's ingest chain, which reaches
      # sanitizeDescription.js -> dompurify, so the node_modules must be present
      # or the run dies with ERR_MODULE_NOT_FOUND before any comparison.
      - name: Install dependencies
        run: npm ci

      - name: Compare fresh Blizzard ingest against committed data
        # Skipped on fork PRs, which don't receive secrets (the auth would fail).
        # Descriptions aren't fetched — a soft field (no build-string impact) that
        # would add thousands of requests per run.
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request' }}
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: node scripts/compareSources.js
