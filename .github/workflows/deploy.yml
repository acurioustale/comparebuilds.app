name: deploy

# Validate, then deploy, in one workflow. `validate` is the full quality gate
# (mirrors validate.sh) and is the required status check; `deploy` depends on it,
# so a red gate never ships. Deploy runs on pushes to main and manual dispatch,
# and is skipped on pull requests (where only the gate runs).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without writing (rsync --dry-run)"
        type: boolean
        default: false

# Least privilege: neither job needs to write to the repo. validate only reads
# the checkout to lint, test and build; deploy authenticates to the host over SSH
# (DEPLOY_SSH_KEY), not with the GITHUB_TOKEN. contents: read drops every other
# default scope.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read tool versions
        id: versions
        run: |
          {
            echo "php=$(awk '/^php/ {print $2}' .tool-versions)"
            echo "shfmt=$(awk '/^shfmt/ {print $2}' .tool-versions)"
            echo "phpcsfixer=$(awk '/^php-cs-fixer/ {print $2}' .tool-versions)"
            echo "phpunit=$(awk '/^phpunit/ {print $2}' .tool-versions)"
            echo "actionlint=$(awk '/^actionlint/ {print $2}' .tool-versions)"
          } >> "$GITHUB_OUTPUT"

      - name: Shell scripts (shellcheck + shfmt)
        run: |
          shellcheck ./*.sh
          curl -sSfL https://github.com/mvdan/sh/releases/download/v${{ steps.versions.outputs.shfmt }}/shfmt_v${{ steps.versions.outputs.shfmt }}_linux_amd64 -o /tmp/shfmt
          chmod +x /tmp/shfmt
          /tmp/shfmt -d ./*.sh

      # The runner's default PHP (8.3) is older than PHPUnit 13 needs (>= 8.4.1),
      # so pin it. This also makes php-cs-fixer and php -l run on a fixed version.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.versions.outputs.php }}

      - name: PHP (syntax, format, tests)
        run: |
          for f in $(git ls-files '*.php' '*.php.example'); do php -l "$f"; done
          curl -sSfL https://github.com/PHP-CS-Fixer/PHP-CS-Fixer/releases/download/v${{ steps.versions.outputs.phpcsfixer }}/php-cs-fixer.phar -o /tmp/php-cs-fixer
          php /tmp/php-cs-fixer fix --dry-run --config .php-cs-fixer.dist.php
          curl -sSfL https://phar.phpunit.de/phpunit-${{ steps.versions.outputs.phpunit }}.phar -o /tmp/phpunit
          php /tmp/phpunit

      - name: Workflows (actionlint)
        run: |
          curl -sSfL https://github.com/rhysd/actionlint/releases/download/v${{ steps.versions.outputs.actionlint }}/actionlint_${{ steps.versions.outputs.actionlint }}_linux_amd64.tar.gz | tar xz actionlint
          ./actionlint

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint Markdown
        run: npm run lint:md

      - name: Check SVG (svgo)
        run: npm run lint:svg

      - name: Run tests with coverage thresholds
        run: npm run coverage

      - name: Build
        run: npm run build

      # Verify the CSP hash for the inline anti-flash theme script still matches
      # the built script's bytes — runs against dist/ so it checks what ships.
      - name: CSP guard
        run: npm run check:csp

      # Well-formedness check on the generated sitemap — catches a templating bug
      # in prerenderSpecs before deploy. xmllint isn't on the runner image by
      # default, so install libxml2-utils first.
      - name: Validate sitemap (xmllint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          xmllint --noout dist/sitemap.xml

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Serialize deploys: never let two runs rsync to the host at once. Queue
    # rather than cancel so an in-flight deploy always finishes cleanly.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      # Full history so prerenderSpecs can derive each sitemap URL's <lastmod>
      # from the last commit that touched its source data (shallow returns none).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/comparebuilds_deploy
          chmod 600 ~/.ssh/comparebuilds_deploy

          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Pin the dedicated key to the host and forbid any other identity, so
          # the agent/default keys can't interfere with auth.
          {
            echo "Host http2.core-networks.de"
            echo "  HostName http2.core-networks.de"
            echo "  User web4186"
            echo "  IdentityFile ~/.ssh/comparebuilds_deploy"
            echo "  IdentitiesOnly yes"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: ./deploy.sh ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
