name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys: never let two runs rsync to the host at the same time.
# Queue rather than cancel so an in-flight deploy always finishes cleanly.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/comparebuilds_deploy
          chmod 600 ~/.ssh/comparebuilds_deploy

          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Pin the dedicated key to the host and forbid any other identity, so
          # the agent/default keys can't interfere with auth.
          {
            echo "Host http2.core-networks.de"
            echo "  HostName http2.core-networks.de"
            echo "  User web4186"
            echo "  IdentityFile ~/.ssh/comparebuilds_deploy"
            echo "  IdentitiesOnly yes"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: ./deploy.sh
