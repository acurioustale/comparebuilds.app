name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Shell scripts (shellcheck + shfmt)
        run: |
          shellcheck ./*.sh
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64 -o /tmp/shfmt
          chmod +x /tmp/shfmt
          /tmp/shfmt -d ./*.sh

      - name: PHP syntax check
        run: |
          for f in $(git ls-files '*.php' '*.php.example'); do php -l "$f"; done

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests with coverage thresholds
        run: npm run coverage

      - name: Build
        run: npm run build
