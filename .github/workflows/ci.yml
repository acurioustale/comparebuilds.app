name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Shell scripts (shellcheck + shfmt)
        run: |
          shellcheck ./*.sh
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64 -o /tmp/shfmt
          chmod +x /tmp/shfmt
          /tmp/shfmt -d ./*.sh

      - name: PHP (syntax + format)
        run: |
          for f in $(git ls-files '*.php' '*.php.example'); do php -l "$f"; done
          curl -sSfL https://github.com/PHP-CS-Fixer/PHP-CS-Fixer/releases/download/v3.95.10/php-cs-fixer.phar -o /tmp/php-cs-fixer
          php /tmp/php-cs-fixer fix --dry-run --config .php-cs-fixer.dist.php

      - name: Workflows (actionlint)
        run: |
          curl -sSfL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz | tar xz actionlint
          ./actionlint

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint Markdown
        run: npm run lint:md

      - name: Run tests with coverage thresholds
        run: npm run coverage

      - name: Build
        run: npm run build
